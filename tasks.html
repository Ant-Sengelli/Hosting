<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>
<style>
  @font-face {
    font-family: 'AyrBlufy';
    src: url('https://ant-sengelli.github.io/Hosting/AyrBlufy-BlackOblique.woff2') format('woff2');
    font-weight: 900;
    font-style: oblique;
  }

  :root {
    --purple: #421d79;
    --cream: #fdf5e0;
    --gold: #ffc700;
    --dim: rgba(253, 245, 224, 0.35);
    --font: 'AyrBlufy', sans-serif;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    color: var(--cream);
    font-family: var(--font);
    overflow: hidden;
  }

  #app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 0.75rem 0.5rem 0.5rem;
  }

  /* ── AUTH ── */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.6rem;
    padding-top: 0.25rem;
  }

  #auth-screen p {
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    line-height: 1.4;
  }

  #sign-in-btn {
    background: none;
    border: 1.5px solid var(--gold);
    color: var(--gold);
    font-family: var(--font);
    font-size: 0.85rem;
    padding: 0.35rem 0.9rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: background 0.2s, color 0.2s;
  }

  #sign-in-btn:hover {
    background: var(--gold);
    color: var(--purple);
  }

  /* ── LIST TABS ── */
  #list-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem 0.5rem;
    align-items: baseline;
    min-height: 1.4rem;
    margin-top: auto;
    padding-top: 0.4rem;
  }

  .list-tab {
    background: none;
    border: none;
    font-family: var(--font);
    font-size: 1rem;
    color: var(--dim);
    cursor: pointer;
    padding: 0;
    letter-spacing: 0.06em;
    transition: color 0.2s;
    white-space: nowrap;
  }

  .list-tab:not(:last-child)::after {
    content: '/';
    color: var(--gold);
    margin-left: 0.35em;
    opacity: 0.5;
  }

  .list-tab:hover { color: var(--cream); }

  .list-tab.active {
    color: var(--gold);
  }

  /* ── TASK LIST ── */
  #task-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    scrollbar-width: none;
  }

  #task-list::-webkit-scrollbar { display: none; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.25rem 0;
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp 0.35s ease-out forwards;
    cursor: default;
  }

  .task-item:hover .task-title {
    color: var(--gold);
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .task-check {
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 50%;
    background: var(--cream);
    flex-shrink: 0;
    margin-top: 0.35rem;
  }

  .task-title {
    font-size: 1.05rem;
    color: var(--cream);
    line-height: 1.35;
    letter-spacing: 0.02em;
    transition: color 0.2s;
    word-break: break-word;
  }

  .task-due {
    display: block;
    font-size: 0.75rem;
    color: var(--gold);
    opacity: 0.65;
    margin-top: 0.1rem;
    letter-spacing: 0.04em;
  }

  /* ── STATES ── */
  .state-msg {
    font-size: 0.9rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    padding: 0.25rem 0;
  }
</style>
</head>
<body>
<div id="app">
  <div id="auth-screen" style="display:none">
    <p>Connect Google Tasks</p>
    <button id="sign-in-btn">SIGN IN</button>
  </div>

  <div id="tasks-screen" style="display:none; flex-direction:column; gap:0.5rem; height:100%;">
    <div id="task-list"></div>
    <div id="list-tabs"></div>
  </div>
</div>

<script>
  const CLIENT_ID = '642016576347-b4fr8esf8faa2i6ohtjon7s9ibuioa0c.apps.googleusercontent.com';
  const SCOPES    = 'https://www.googleapis.com/auth/tasks.readonly';
  const REDIRECT  = location.origin + location.pathname;

  // ── Token helpers ──────────────────────────────────────────────
  function saveToken(token, expiresIn) {
    const exp = Date.now() + (expiresIn - 60) * 1000;
    localStorage.setItem('gt_token', token);
    localStorage.setItem('gt_exp',   exp);
  }

  function getToken() {
    const token = localStorage.getItem('gt_token');
    const exp   = parseInt(localStorage.getItem('gt_exp') || '0', 10);
    if (token && Date.now() < exp) return token;
    return null;
  }

  function clearToken() {
    localStorage.removeItem('gt_token');
    localStorage.removeItem('gt_exp');
  }

  // ── OAuth flow ─────────────────────────────────────────────────
  function startAuth() {
    const params = new URLSearchParams({
      client_id:     CLIENT_ID,
      redirect_uri:  REDIRECT,
      response_type: 'token',
      scope:         SCOPES,
      prompt:        'select_account'
    });
    location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params;
  }

  function handleCallback() {
    const hash = new URLSearchParams(location.hash.slice(1));
    const token = hash.get('access_token');
    const exp   = parseInt(hash.get('expires_in') || '0', 10);
    if (token) {
      saveToken(token, exp);
      history.replaceState(null, '', location.pathname);
      return token;
    }
    return null;
  }

  // ── API ────────────────────────────────────────────────────────
  async function apiFetch(url, token) {
    const res = await fetch(url, {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.status === 401) { clearToken(); showAuth(); return null; }
    return res.json();
  }

  async function fetchLists(token) {
    const data = await apiFetch(
      'https://tasks.googleapis.com/tasks/v1/users/@me/lists?maxResults=100',
      token
    );
    return data?.items || [];
  }

  async function fetchTasks(token, listId) {
    const data = await apiFetch(
      `https://tasks.googleapis.com/tasks/v1/lists/${listId}/tasks?showCompleted=false&showHidden=false&maxResults=100`,
      token
    );
    // Only top-level, needsAction tasks
    return (data?.items || []).filter(t => t.status === 'needsAction' && !t.parent);
  }

  // ── Render ─────────────────────────────────────────────────────
  let allLists    = [];
  let activeListId = null;

  function showAuth() {
    document.getElementById('auth-screen').style.display   = 'flex';
    document.getElementById('tasks-screen').style.display  = 'none';
  }

  function showTasksScreen() {
    document.getElementById('auth-screen').style.display   = 'none';
    document.getElementById('tasks-screen').style.display  = 'flex';
  }

  function renderTabs() {
    const el = document.getElementById('list-tabs');
    el.innerHTML = '';
    allLists.forEach(list => {
      const btn = document.createElement('button');
      btn.className  = 'list-tab' + (list.id === activeListId ? ' active' : '');
      btn.textContent = list.title;
      btn.onclick = () => selectList(list.id);
      el.appendChild(btn);
    });
  }

  function renderTasks(tasks) {
    const el = document.getElementById('task-list');
    el.innerHTML = '';

    if (!tasks.length) {
      const msg = document.createElement('div');
      msg.className   = 'state-msg';
      msg.textContent = 'all clear.';
      el.appendChild(msg);
      return;
    }

    tasks.forEach((task, i) => {
      const item = document.createElement('div');
      item.className = 'task-item';
      item.style.animationDelay = (i * 0.055) + 's';

      const check = document.createElement('div');
      check.className = 'task-check';

      const body = document.createElement('div');

      const title = document.createElement('span');
      title.className   = 'task-title';
      title.textContent = task.title;
      body.appendChild(title);

      if (task.due) {
        const due = document.createElement('span');
        due.className   = 'task-due';
        const d = new Date(task.due);
        due.textContent = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        body.appendChild(due);
      }

      item.appendChild(check);
      item.appendChild(body);
      el.appendChild(item);
    });
  }

  async function selectList(id) {
    activeListId = id;
    renderTabs();
    const token = getToken();
    if (!token) { showAuth(); return; }

    const el = document.getElementById('task-list');
    el.innerHTML = '<div class="state-msg">loading…</div>';

    const tasks = await fetchTasks(token, id);
    if (tasks !== null) renderTasks(tasks);
  }

  async function init() {
    // Check for OAuth callback
    let token = location.hash.includes('access_token') ? handleCallback() : getToken();

    if (!token) { showAuth(); return; }

    showTasksScreen();

    const lists = await fetchLists(token);
    if (!lists) return;

    allLists     = lists;
    activeListId = lists[0]?.id;
    renderTabs();

    if (activeListId) await selectList(activeListId);
  }

  // ── Events ─────────────────────────────────────────────────────
  document.getElementById('sign-in-btn').onclick = startAuth;

  init();
</script>
</body>
</html>
